<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Henry Zhang · CyberWizard — local preview</title>

  <!-- GitHub's own Primer markdown CSS (keeps this preview pixel-accurate) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown.css">
  <!-- marked: markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <style>
    :root {
      color-scheme: light dark;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #0d1117;
    }
    body.light {
      background: #f6f8fa;
    }

    .shell {
      max-width: 1012px;
      margin: 32px auto 96px;
      padding: 0 24px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      font-size: 12px;
      color: #8d96a8;
    }
    .toolbar span.label {
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
    }
    .toolbar button {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .toolbar button:hover {
      background: #30363d;
    }
    body.light .toolbar button {
      background: #f6f8fa;
      color: #24292f;
      border-color: #d0d7de;
    }
    body.light .toolbar button:hover {
      background: #eaeef2;
    }

    .card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 48px 48px 56px;
    }
    body.light .card {
      background: #ffffff;
      border-color: #d0d7de;
    }

    /* force the markdown body to inherit the card background */
    .markdown-body {
      background: transparent !important;
      color-scheme: dark;
    }
    body.light .markdown-body {
      color-scheme: light;
    }

    /* nicer badge rendering: prevent line breaks inside badge runs */
    .markdown-body img[src*="img.shields.io"] {
      vertical-align: middle;
      margin: 2px;
    }

    /* tighten table look for the big matrix */
    .markdown-body table {
      display: table;
      width: 100%;
      font-size: 13px;
    }
    .markdown-body table td,
    .markdown-body table th {
      vertical-align: top;
    }
    .markdown-body sub {
      font-size: 10.5px;
      line-height: 1.3;
      color: #8d96a8;
    }
    body.light .markdown-body sub {
      color: #656d76;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <span class="label">preview of</span> <code>HenryZ838978/README.md</code>
      <span style="flex: 1"></span>
      <button onclick="document.body.classList.toggle('light'); document.body.classList.toggle('dark');">
        toggle light / dark
      </button>
      <button onclick="location.reload()">reload</button>
    </div>
    <div class="card">
      <article id="content" class="markdown-body"></article>
    </div>
  </div>

  <script>
    const el = document.getElementById('content');

    marked.setOptions({
      gfm: true,
      breaks: false,
      headerIds: true,
      mangle: false,
    });

    fetch('./README.md', { cache: 'no-store' })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(md => {
        el.innerHTML = marked.parse(md);
      })
      .catch(err => {
        el.innerHTML =
          '<h2 style="color:#f85149">Could not load README.md</h2>' +
          '<p>Browsers block <code>fetch()</code> over <code>file://</code>. ' +
          'Serve this folder over HTTP:</p>' +
          '<pre><code>cd /Users/edy/1-ARoot/CyberWizard/HenryZ838978\n' +
          'python3 -m http.server 8765\n' +
          '# then open http://localhost:8765/preview.html</code></pre>' +
          '<p>Error: ' + err.message + '</p>';
      });
  </script>
</body>
</html>
